<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вход — ChatApp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-card__icon">👋</div>
  <h1 class="auth-card__title">Добро пожаловать!</h1>
  <p class="auth-card__sub">Войдите, чтобы продолжить</p>
  <form id="loginForm" method="post" action="/login">
    <div class="field">
      <label for="nickname">Никнейм</label>
      <input type="text" id="nickname" name="nickname" placeholder="Введите никнейм" required autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Войти →</button>
    {% if error %}<p class="error-msg">{{ error }}</p>{% endif %}
  </form>
  <p class="auth-link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
