<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ChatApp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
<div class="auth-card">
  <p class="auth-card__greeting">{{ greeting }} 👋</p>
  <h1 class="auth-card__title">Добро пожаловать!</h1>
  <form id="loginForm" novalidate>
    <div class="field">
      <label for="login">Логин</label>
      <input type="text" id="login" name="login" placeholder="username" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Войти</button>
  </form>
  <p class="auth-link">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
